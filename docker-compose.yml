services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-8080}:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PYTHONPATH: /srv
      DATABASE_PATH: /srv/data/ter-chatbot.db
    working_dir: /srv
    volumes:
      - ./backend:/srv/backend
      - ter_chatbot_data:/srv/data
    command: >
      uvicorn backend.api:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${UI_HOST_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  ter_chatbot_data:
